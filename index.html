```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Vehicle Info Finder</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Consolas, monospace;
}

body{
    background:#000;
    color:#00ff88;
    overflow-x:hidden;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    opacity:0.08;
}

header{
    width:100%;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #00ff88;
    box-shadow:0 0 15px #00ff88;
    background:#050505;
}

header h1{
    font-size:34px;
    text-shadow:0 0 10px #00ff88;
}

<body>

<canvas id="matrix"></canvas>

<header>
    <h1>MRS. KRISHNA KANTA DAS</h1>
    <p>CYBERSECURITY EXPERT</p>
</header>

<div class="container">

    <div class="search-box">
        <input type="text" id="vehicleNumber" placeholder="ENTER VEHICLE NUMBER (OD02BU7856)">
        <button onclick="fetchVehicleInfo()">SEARCH</button>
    </div>

    <div class="loading" id="loading">
        SEARCHING VEHICLE DATABASE...
    </div>

    <div class="error" id="error"></div>

    <div class="result-box" id="resultBox">
        <div class="result-title">VEHICLE INFORMATION</div>
        <div class="grid" id="resultGrid"></div>
    </div>

</div>

<footer>
    SYSTEM ACTIVE • VEHICLE TRACE MODULE

    <div class="footer-buttons">
        <button onclick="copyData()">COPY</button>
        <button onclick="downloadData()">DOWNLOAD</button>
        <button onclick="window.print()">PRINT</button>
        <button onclick="clearData()">CLEAR</button>
    </div>
</footer>

<script>

let currentVehicleData = null;

async function fetchVehicleInfo(){

    const vehicleInput = document
        .getElementById('vehicleNumber')
        .value
        .trim()
        .toUpperCase();

    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const resultBox = document.getElementById('resultBox');
    const resultGrid = document.getElementById('resultGrid');

    resultGrid.innerHTML = '';
    error.style.display = 'none';
    resultBox.style.display = 'none';

    if(vehicleInput === ''){
        error.innerText = 'PLEASE ENTER VEHICLE NUMBER';
        error.style.display = 'block';
        return;
    }

    loading.style.display = 'block';

    try{

        const apiURL = `https://vehinfo.ek4nsh.in/api/vehicle?rc=${vehicleInput}`;

        const response = await fetch(apiURL);

        if(!response.ok){
            throw new Error('API ERROR');
        }

        const data = await response.json();

        loading.style.display = 'none';

        console.log(data);

        if(!data || Object.keys(data).length === 0){
            error.innerText = 'NO VEHICLE DATA FOUND';
            error.style.display = 'block';
            return;
        }

        currentVehicleData = data;

        for(const key in data){

            let value = data[key];

            if(typeof value === 'object'){
                value = JSON.stringify(value, null, 2);
            }

            const card = document.createElement('div');
            card.className = 'card';

            card.innerHTML = `
                <h3>${formatKey(key)}</h3>
                <p>${value}</p>
            `;

            resultGrid.appendChild(card);
        }

        resultBox.style.display = 'block';

    }catch(err){

        loading.style.display = 'none';

        error.innerText = 'FAILED TO FETCH VEHICLE DATA OR API BLOCKED';
        error.style.display = 'block';

        console.log(err);
    }
}

function formatKey(key){
    return key
        .replace(/_/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase());
}

function copyData(){

    if(!currentVehicleData){
        alert('NO DATA AVAILABLE');
        return;
    }

    navigator.clipboard.writeText(
        JSON.stringify(currentVehicleData, null, 2)
    );

    alert('DATA COPIED SUCCESSFULLY');
}

function downloadData(){

    if(!currentVehicleData){
        alert('NO DATA AVAILABLE');
        return;
    }

    const blob = new Blob(
        [JSON.stringify(currentVehicleData, null, 2)],
        {type:'application/json'}
    );

    const link = document.createElement('a');

    link.href = URL.createObjectURL(blob);

    link.download = 'vehicle-data.json';

    link.click();
}

function clearData(){

    document.getElementById('vehicleNumber').value = '';

    document.getElementById('resultBox').style.display = 'none';

    document.getElementById('error').style.display = 'none';

    currentVehicleData = null;
}

// ENTER KEY SEARCH

document
.getElementById('vehicleNumber')
.addEventListener('keypress', function(e){

    if(e.key === 'Enter'){
        fetchVehicleInfo();
    }
});

// MATRIX EFFECT

const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let i = 0; i < columns; i++){
    drops[i] = 1;
}

function draw(){

    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = '#00ff88';
    ctx.font = fontSize + 'px monospace';

    for(let i = 0; i < drops.length; i++){

        const text = chars[Math.floor(Math.random()*chars.length)];

        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 35);

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

</script>

</body>
</html>
